<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>YTU Club System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>YTU Club System</h1>

    <!-- Ana menü -->
    <div id="mainMenu">
        <button id="btnLogin">Giriş Yap</button>
        <button id="btnRegister">Kayıt Ol</button>
        <button id="btnAuth" class="btn-auth">Yetkili Girişi</button>
    </div>

    <!-- Öğrenci Giriş Formu -->
    <div id="loginForm" class="form-container" style="display:none;">
        <h2>Giriş Yap</h2>

        <input type="text" id="loginUserId" placeholder="Kullanıcı Adı">
        <input type="password" id="loginPassword" placeholder="Şifre">

        <button id="btnLoginSubmit">Giriş Yap</button>
        <button id="btnLoginBack" class="btn-secondary btn-back">Geri Dön</button>
    </div>

    <!-- Kayıt Formu -->
    <div id="registerForm" class="form-container" style="display:none;">
        <h2>Kayıt Ol</h2>

        <input type="text" id="regUserId" placeholder="Kullanıcı Adı">
        <input type="password" id="regPassword" placeholder="Şifre">
        <input type="password" id="regPassword2" placeholder="Şifre(tekrar)">
        <input type="text" id="regFname" placeholder="İsim">
        <input type="text" id="regLname" placeholder="Soyisim">
        <input type="text" id="regPhone" placeholder="Telefon">

        <button id="btnSubmitRegister">Kaydı Tamamla</button>
        <button id="btnBack" class="btn-secondary btn-back">Geri Dön</button>
    </div>

    <!-- Yetkili Giriş Formu -->
    <div id="authForm" class="form-container" style="display:none;">
        <h2>Yetkili Girişi</h2>

        <input type="text" id="authId" placeholder="Yetkili ID">
        <input type="password" id="authPassword" placeholder="Şifre">

        <button id="btnAuthLogin">Giriş Yap</button>
        <button id="btnBack2" class="btn-secondary btn-back">Geri Dön</button>
    </div>

    <!-- Öğrenci giriş sonrası sayfa -->
    <div id="studentHome" style="display:none; margin-top:80px;">
        <!-- Öğrenci işlem butonları -->
        <div style="display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:20px;">
            <button id="btnMyClubs">Üyesi Olduğum Kulüpler</button>
            <button id="btnListAllClubs">Kulüpleri Listele</button>
            <button id="btnDeleteAccount">Hesap Sil</button>
        </div>
        <!-- Geri dön butonu -->
        <button id="btnStudentBack" class="btn-secondary btn-back">Çıkış Yap</button>
        <!-- Öğrenci ekranı için liste alanı -->
        <div id="studentListAreaWrapper">
            <div id="studentListArea"></div>
        </div>
        
    </div>

    <!-- Yetkili Paneli -->
    <div id="authPanel" style="display:none; margin-top:30px;">
        <h2>Yönetim Paneli</h2>

        <div id="panelButtons">
            <button id="btnAddClub" class="panelBtn">Kulüp Ekle</button>
            <button id="btnListClubs" class="panelBtn">Kulüpleri Listele</button>
            <button id="btnListStudents" class="panelBtn">Öğrencileri Listele</button>
            <button id="btnAuthBack" class="btn-secondary btn-back">Çıkış Yap</button>
        </div>

        <!-- Kulüp Ekleme Formu -->
        <div id="addClubForm" class="form-container" style="display:none;">
            <h2>Yeni Kulüp Ekle</h2>

            <input type="text" id="clubName" placeholder="Kulüp Adı">
            <textarea id="clubInfo" placeholder="Kulüp Bilgisi" rows="4"></textarea>

            <button id="btnSubmitClub">Kaydet</button>
            <button id="btnCancelAddClub" class="btn-secondary">İptal</button>
        </div>

        <!-- Duyuru Ekleme Formu (BURAYA EKLE) -->
        <div id="announcementForm" class="form-container" style="display:none;">
            <h2>Duyuru Ekle</h2>

            <textarea id="announcementText" placeholder="Duyuru metni" rows="4"></textarea>

            <button id="btnSaveAnnouncement">Kaydet</button>
            <button id="btnCancelAnnouncement" class="btn-secondary">İptal</button>
        </div>

        <!-- Liste alanı -->
        <div id="listArea"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
